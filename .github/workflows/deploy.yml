# .github/workflows/deploy.yml
name: Deploy to VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and start containers
        run: |
          docker compose -f infra/docker-compose.yml build
          docker compose -f infra/docker-compose.yml up -d
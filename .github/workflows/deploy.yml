name: Deploy to VM

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

jobs:
  deploy:
    runs-on: [self-hosted]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Acquire deployment lock
        run: |
          exec 9>/tmp/fraude-ary-deploy.lock
          flock -n 9 || { echo "Another deployment holds the lock"; exit 1; }
          echo "Lock acquired (PID $$)"

      - name: Force clean all old containers and networks
        run: |
          cd ${{ github.workspace }}/infra
          docker compose down --remove-orphans --timeout 10 || true
          docker stop $(docker ps -aq --filter "name=infra-") 2>/dev/null || true
          docker rm -f $(docker ps -aq --filter "name=infra-") 2>/dev/null || true
          docker network prune -f || true

      - name: Build and start containers
        run: |
          cd ${{ github.workspace }}/infra
          docker compose build --no-cache
          docker compose up -d

      - name: Verify deployment
        run: |
          echo "Waiting for backend to start (migrations + uvicorn)..."
          for i in {1..12}; do
            sleep 5
            if curl -s http://localhost:8000/health | grep -q "ok"; then
              echo "Deployment successful"
              exit 0
            fi
            echo "Attempt $i/12 - backend not ready yet..."
          done
          echo "Backend failed to start"
          docker logs infra-backend-1 --tail 50
          exit 1

      - name: Release deployment lock
        if: always()
        run: |
          rm -f /tmp/fraude-ary-deploy.lock
          echo "Lock released"

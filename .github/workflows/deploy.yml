name: Deploy to VM

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Acquire deployment lock
        run: |
          LOCK_FILE="/tmp/fraude-ary-deploy.lock"
          while [ -f "$LOCK_FILE" ]; do
            echo "Another deployment is holding the lock, waiting 10s..."
            sleep 10
          done
          echo "$$" > "$LOCK_FILE"
          echo "Lock acquired"

      - name: Set environment variables
        run: |
          echo "POSTGRES_PASSWORD=devpassword123" >> $GITHUB_ENV
          echo "JWT_SECRET=prodsecretchange123" >> $GITHUB_ENV
          echo "TAG=${{ github.sha }}" >> $GITHUB_ENV
          echo "REPO_DIR=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Force clean all old containers and networks
        run: |
          cd $REPO_DIR/infra
          docker compose down --remove-orphans --timeout 10 || true
          docker stop $(docker ps -aq --filter "name=infra-") 2>/dev/null || true
          docker rm -f $(docker ps -aq --filter "name=infra-") 2>/dev/null || true
          docker network prune -f || true
          docker system prune -f || true

      - name: Build and start containers
        run: |
          cd $REPO_DIR/infra
          docker compose build --no-cache
          docker compose up -d

      - name: Verify deployment
        run: |
          sleep 15
          curl -s http://localhost:8000/health || exit 1
          echo "Deployment successful"

      - name: Release deployment lock
        if: always()
        run: |
          rm -f /tmp/fraude-ary-deploy.lock
          echo "Lock released"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fraudeary
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [db-net]

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-devredis}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devredis}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [db-net]

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://app:${POSTGRES_PASSWORD:-devpassword123}@postgres:5432/fraudeary
      REDIS_URL: redis://:${REDIS_PASSWORD:-devredis}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-for-local-development-only-32chars}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      PYTHON_ENV: development
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports: ["8000:8000"]
    networks: [backend-net, db-net]
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile.dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: development
    ports: ["3000:3000"]
    networks: [frontend-net, backend-net]

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports: ["80:80"]
    depends_on: [backend, frontend]
    networks: [frontend-net]

networks:
  frontend-net:
  backend-net:
  db-net:

volumes:
  postgres_data:

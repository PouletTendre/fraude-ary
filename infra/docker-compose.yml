services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fraudeary
      POSTGRES_USER: app
      # ⚠️  WARNING: Change this password for production use!
      # Set POSTGRES_PASSWORD in your environment or .env file before deploying.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [db-net]
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    # ⚠️  WARNING: Change this password for production use!
    # Set REDIS_PASSWORD in your environment or .env file before deploying.
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [db-net]
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://app:${POSTGRES_PASSWORD:-devpassword123}@postgres:5432/fraudeary
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      # ⚠️  WARNING: Set JWT_SECRET in your environment or .env file before deploying.
      # Must be at least 32 random characters. Never use a default for production.
      JWT_SECRET: ${JWT_SECRET:-prodsecretchange123-must-be-at-least-32chars}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      PYTHON_ENV: production
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    expose: ["8000"]
    networks: [backend-net, db-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost
    expose: ["3000"]
    networks: [frontend-net, backend-net]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # ─── TLS/SSL certificates (uncomment for HTTPS) ───
      # Mount your SSL certificate and key. For development, generate self-signed:
      #   mkdir -p certs && cd certs
      #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
      #     -keyout cert.key -out cert.crt \
      #     -subj "/C=FR/ST=IdF/L=Paris/O=Local/CN=localhost"
      # For production, mount real CA-issued certificates here.
      # - ./certs:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend: { condition: service_healthy }
      frontend: { condition: service_healthy }
    networks: [frontend-net, backend-net]
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  frontend-net:
  backend-net:
  db-net:

  # ═══════════════════════════════════════════════════════════

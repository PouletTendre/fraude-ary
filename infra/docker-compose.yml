services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fraudeary
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "app"]
      interval: 10s

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  backend:
    image: ghcr.io/vous/fraude-ary-backend:${TAG}
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports: ["8000:8000"]

  frontend:
    image: ghcr.io/vous/fraude-ary-frontend:${TAG}
    env_file: .env
    ports: ["3000:3000"]

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt
    ports: ["80:80","443:443"]
    depends_on: [backend, frontend]

volumes:
  postgres_data:
  certbot_certs:
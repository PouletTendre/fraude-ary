events {
    worker_connections 1024;
}

http {
    server_tokens off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Security headers (added to all responses)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://query1.finance.yahoo.com https://api.frankfurter.app https://min-api.cryptocompare.com" always;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 10M;

        # Hide upstream headers
        proxy_hide_header X-Powered-By;

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ─────────────────────────────────────────────────────────────
    # HTTPS (TLS) — Uncomment and configure for production use.
    # ─────────────────────────────────────────────────────────────
    # 1. Generate self-signed cert (dev) or obtain Let's Encrypt cert (prod)
    #    mkdir -p infra/certs && cd infra/certs
    #    openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #      -keyout cert.key -out cert.crt \
    #      -subj "/C=FR/ST=IdF/L=Paris/O=Local/CN=localhost"
    # 2. In docker-compose.yml, add to nginx service:

events {
    worker_connections 1024;
}

http {
    server_tokens off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Security headers (added to all responses)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://query1.finance.yahoo.com https://api.frankfurter.app https://min-api.cryptocompare.com" always;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    # ─────────────────────────────────────────────────────────────
    # HTTPS (TLS) server block
    # ─────────────────────────────────────────────────────────────
    # For development, generate a self-signed certificate:
    #   mkdir -p infra/certs && cd infra/certs
    #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #     -keyout cert.key -out cert.crt \
    #     -subj "/C=FR/ST=IdF/L=Paris/O=Local/CN=localhost"
    # Then mount via docker compose volumes:
    #   - ./certs:/etc/nginx/ssl:ro
    #
    # For production, mount real Let's Encrypt or CA-issued certs at the same paths.
    # ─────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name localhost;

        # SSL certificate paths — mount via docker volume or bind-mount
        ssl_certificate     /etc/nginx/ssl/cert.crt;
        ssl_certificate_key /etc/nginx/ssl/cert.key;

        # Modern TLS configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 1.1.1.1 valid=300s;
        resolver_timeout 5s;

        # HSTS (HTTP Strict Transport Security) — max-age 1 year, include subdomains
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        client_max_body_size 10M;

        # Hide upstream headers
        proxy_hide_header X-Powered-By;

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ─────────────────────────────────────────────────────────────
    # HTTP → HTTPS redirect server
    # ─────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Redirect all HTTP traffic to HTTPS (301 permanent redirect)
        return 301 https://$host$request_uri;
    }
}
